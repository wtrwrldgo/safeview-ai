<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SafeView Overlay Preview</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #mock-video-container {
            position: relative;
            width: 800px;
            height: 450px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Insert our new overlay code here exactly as it runs in extension */
        #safeview-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 15, 25, 0.4);
            backdrop-filter: blur(80px) saturate(0.8);
            -webkit-backdrop-filter: blur(80px) saturate(0.8);
            z-index: 2147483647;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #sv-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #F8FAFC;
            font-family: 'Inter', system-ui, sans-serif;
            padding: 32px 48px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: scale(0.95);
            opacity: 0;
            animation: sv-pop 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes sv-pop {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .sv-icon-wrapper {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(185, 28, 28, 0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(239, 68, 68, 0.3);
            box-shadow: 0 0 24px rgba(239, 68, 68, 0.2);
            margin-bottom: 8px;
        }

        .sv-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0;
        }

        .sv-desc {
            font-size: 15px;
            font-weight: 500;
            color: #94A3B8;
            margin: 0;
        }

        .sv-brand {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <div id="mock-video-container">
        <div id="safeview-overlay">
            <div id="sv-badge">
                <div class="sv-icon-wrapper">
                    <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="#F87171" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <h2 class="sv-title">Restricted Content</h2>
                <p class="sv-desc" id="safeview-cause">Violence / Gore detected</p>
                <div class="sv-brand">Protected by SafeView AI</div>
            </div>
        </div>
    </div>
</body>

</html>
